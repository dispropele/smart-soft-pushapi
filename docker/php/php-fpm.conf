[global]
daemonize = no
listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

[www]
user = www-data
group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 15

clear_env = no
catch_workers_output = yes

; Timeouts
request_terminate_timeout = 300
